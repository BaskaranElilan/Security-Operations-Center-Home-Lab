# Prometheus Configuration
# SOC Home Lab — System & Service Metrics Collection
#
# Location: /etc/prometheus/prometheus.yml
# Replace IP addresses with your actual VM private IPs.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alerting (optional - can be configured later)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - "localhost:9093"

# Rule files (optional)
# rule_files:
#   - "alert_rules.yml"

scrape_configs:
  # ==================== Self Monitoring ====================
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          instance: "prometheus-server"

  # ==================== Wazuh Server ====================
  - job_name: "wazuh-server"
    static_configs:
      - targets: ["10.0.1.10:9100"]
        labels:
          instance: "wazuh-server"
          role: "siem"
          subnet: "security-tools"

  # ==================== Security Tools VM ====================
  - job_name: "security-tools"
    static_configs:
      - targets: ["10.0.1.20:9100"]
        labels:
          instance: "security-tools"
          role: "incident-response"
          subnet: "security-tools"

  # ==================== Suricata NIDS ====================
  - job_name: "suricata-nids"
    static_configs:
      - targets: ["10.0.1.30:9100"]
        labels:
          instance: "suricata-nids"
          role: "nids"
          subnet: "security-tools"

  # ==================== Monitoring VM (Grafana) ====================
  - job_name: "monitoring"
    static_configs:
      - targets: ["10.0.1.40:9100"]
        labels:
          instance: "monitoring"
          role: "visualization"
          subnet: "security-tools"

  # ==================== Windows Endpoint ====================
  - job_name: "windows-endpoint"
    static_configs:
      - targets: ["10.0.2.10:9182"]
        labels:
          instance: "windows-endpoint"
          role: "endpoint"
          subnet: "endpoints"
    # Note: Use windows_exporter on Windows (port 9182)

  # ==================== Linux Endpoint ====================
  - job_name: "linux-endpoint"
    static_configs:
      - targets: ["10.0.2.20:9100"]
        labels:
          instance: "linux-endpoint"
          role: "endpoint"
          subnet: "endpoints"

  # ==================== Kali Attacker ====================
  - job_name: "kali-attacker"
    static_configs:
      - targets: ["10.0.3.10:9100"]
        labels:
          instance: "kali-attacker"
          role: "attack-simulation"
          subnet: "attack"
