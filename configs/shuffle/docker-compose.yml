# Shuffle SOAR Docker Compose
# SOC Home Lab — Security Orchestration, Automation & Response
#
# Deploy: docker-compose up -d
# Access: http://localhost:3001

version: "3.8"

services:
  shuffle-frontend:
    image: ghcr.io/shuffle/shuffle-frontend:latest
    container_name: shuffle-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
      - "3443:443"
    environment:
      - BACKEND_HOSTNAME=shuffle-backend
    networks:
      - shuffle-network

  shuffle-backend:
    image: ghcr.io/shuffle/shuffle-backend:latest
    container_name: shuffle-backend
    restart: unless-stopped
    environment:
      - DATASTORE_EMULATOR_HOST=shuffle-database:8000
      - SHUFFLE_APP_HOTLOAD_FOLDER=/shuffle-apps
      - SHUFFLE_FILE_LOCATION=/shuffle-files
      - ORG_ID=shuffle
      - SHUFFLE_DEFAULT_USERNAME=admin
      - SHUFFLE_DEFAULT_PASSWORD=shuffle_password_change_me
      - SHUFFLE_DEFAULT_APIKEY=shuffle_api_key_change_me
      - SHUFFLE_OPENSEARCH_URL=https://shuffle-opensearch:9200
      - SHUFFLE_OPENSEARCH_USERNAME=admin
      - SHUFFLE_OPENSEARCH_PASSWORD=StrongPassword123!
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - shuffle-apps:/shuffle-apps
      - shuffle-files:/shuffle-files
    networks:
      - shuffle-network

  shuffle-orborus:
    image: ghcr.io/shuffle/shuffle-orborus:latest
    container_name: shuffle-orborus
    restart: unless-stopped
    environment:
      - SHUFFLE_APP_SDK_VERSION=1.4.0
      - SHUFFLE_WORKER_VERSION=latest
      - ORG_ID=shuffle
      - ENVIRONMENT_NAME=Shuffle
      - BASE_URL=http://shuffle-backend:5001
      - DOCKER_API_VERSION=1.40
      - SHUFFLE_BASE_IMAGE_NAME=shuffle
      - SHUFFLE_BASE_IMAGE_REGISTRY=ghcr.io
      - SHUFFLE_BASE_IMAGE_TAG_SUFFIX="-1.4.0"
      - CLEANUP=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - shuffle-network

  shuffle-database:
    image: ghcr.io/shuffle/shuffle-opensearch:latest
    container_name: shuffle-opensearch
    restart: unless-stopped
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
      - discovery.type=single-node
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - shuffle-db-data:/usr/share/opensearch/data
    networks:
      - shuffle-network

volumes:
  shuffle-apps:
  shuffle-files:
  shuffle-db-data:

networks:
  shuffle-network:
    driver: bridge
